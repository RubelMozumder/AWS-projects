AWSTemplateFormatVersion: '2010-09-09'
Description: SNS service for messages from DynamoDB stream via Lambda function

# --------------------------------------------------------------
# Sections
#   Parameters
#   Resources
#     - SNS Topic
#     - SNS Subscription
#   Outputs
# --------------------------------------------------------------

Parameters:
  ProjectName:
    Type: String
    Description: Name of the project (used for resource naming)
    Default: "ServerlessWebBackend"
  EmailEndpoint:
    Type: String
    Description: Email address to subscribe to the SNS topic
  PhoneEndpoint:
    Type: String
    Description: Phone number to subscribe to the SNS topic (in E.164 format, e.g., +1234567890)
  EnableEmailSubscription:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Whether to create an email subscription that requires confirmation
  EnableSMSSubscription:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Whether to create an SMS subscription

Conditions:
  CreateEmailSubscription: !Equals [!Ref EnableEmailSubscription, "true"]
  CreateSMSSubscription: !Equals [!Ref EnableSMSSubscription, "true"]

Resources:
  SNSTopicDynamoDBStream:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-dynamodb-stream"

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: CreateEmailSubscription
    Properties:
      Endpoint: !Ref EmailEndpoint
      TopicArn: !Ref SNSTopicDynamoDBStream
      Protocol: email

  PhoneSubscription:
    Type: AWS::SNS::Subscription
    Condition: CreateSMSSubscription
    Properties:
      Endpoint: !Ref PhoneEndpoint
      TopicArn: !Ref SNSTopicDynamoDBStream
      Protocol: sms
      DeliveryPolicy: 
        healthyRetryPolicy:
          numRetries: 45
          minDelayTarget: 1
          maxDelayTarget: 60
          numNoDelayRetries: 3
          numMinDelayRetries: 2
          numMaxDelayRetries: 35
          backoffFunction: "exponential"

  SNSDeliveryFailuresAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-sns-delivery-failures"
      AlarmDescription: Alarm when SNS delivery attempts fail for the DynamoDB stream topic
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Dimensions:
        - Name: TopicName
          Value: !GetAtt SNSTopicDynamoDBStream.TopicName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  SNSTopicDynamoDBStreamArn:
    Description: ARN of the SNS topic for DynamoDB stream
    Value: !Ref SNSTopicDynamoDBStream
    Export:
      Name: !Sub "${AWS::StackName}-dynamodb-stream-topic-arn"