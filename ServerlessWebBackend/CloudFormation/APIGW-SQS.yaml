AWSTemplateFormatVersion: "2010-09-09"
Description: API Gateway Stack

# ============================================================
# PARAMETERS
# ============================================================
Parameters:
  StageName:
    Type: String
    Default: prod
    AllowedValues: [staging, prod]
    Description: Deployment stage name
  
  ProjectName:
    Type: String
    Description: Name of the project (used for resource naming)
    Default: "ServerlessWebBackend"
  
  OrderQueueArn:
    Type: String
    Description: ARN of the SQS queue for order messages

  OrderQueueName:
    Type: String
    Description: Name of the SQS queue for order messages

  # UserQueueArn:
  #   Type: String
  #   Description: ARN of the SQS queue for user messages

  # UserQueueUrl:
  #   Type: String
  #   Description: URL of the SQS queue for user messages

  AwsRegion:
    Type: String
    Description: AWS region (supplied by root stack)

  AwsAccountId:
    Type: String
    Description: AWS account ID (supplied by root stack)

# ============================================================
# RESOURCES
# ============================================================
Resources:
  # ----------------------------------------------------------
  # 1. IAM Role — allows API Gateway to call SQS
  # source: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-iam-role.html
  # ----------------------------------------------------------
  RoleApiGwSqs:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn:Join:
          - "-"
          - - "role-apigw-sqs"
            - !Ref AwsRegion
      Description: Allows API Gateway to send messages to SQS queues
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AwsAccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:execute-api:${AwsRegion}:${AwsAccountId}:*"
      # Inline policy
      Policies:
        - PolicyName: ApiGatewaySQSSendMessage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Permission to send to the Order queue
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !Ref OrderQueueArn
              # # Permission to send to the User queue
              # - Effect: Allow
              #   Action: sqs:SendMessage
              #   Resource: !Ref UserQueueArn
      # Optional: allow API Gateway to push logs to CloudWatch
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # ----------------------------------------------------------
  # 2. CloudWatch Log Group for API Gateway access logs
  # https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-logs-loggroup.html
  # ----------------------------------------------------------
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/RestApi-${ProjectName}"
      RetentionInDays: 7

  # ----------------------------------------------------------
  # 3. REST API
  # https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-apigateway-restapi.html
  # ----------------------------------------------------------
  RestApiToSQS:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "apigw-rest-api-${ProjectName}"
      Description: REST API with /order resources backed by SQS
      ApiKeySourceType: HEADER
      EndpointConfiguration:
        Types:
          - REGIONAL

  # ----------------------------------------------------------
  # 4. /order resource
  # https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-apigateway-resource.html
  # ----------------------------------------------------------
  OrderResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApiToSQS
      ParentId: !GetAtt RestApiToSQS.RootResourceId
      PathPart: order
  # https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-apigateway-method.html
  # POST /order → SQS (enqueue a new order)
  OrderPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApiToSQS
      ResourceId: !Ref OrderResource
      HttpMethod: POST
      AuthorizationType: NONE            # swap to AWS_IAM / COGNITO_USER_POOLS as needed
      RequestParameters:
        method.request.header.Content-Type: false
      Integration:
        Type: AWS                        # Direct AWS service integration
        IntegrationHttpMethod: POST
        # SQS SendMessage action via service proxy
        # AWS service integration URI structure: arn:aws:apigateway:{region}:{service}:{type}/{path}
        # possible values for {type}: action|path|proxy
        Uri: !Sub "arn:aws:apigateway:${AwsRegion}:sqs:path/${AwsAccountId}/${OrderQueueName}"
        Credentials: !GetAtt RoleApiGwSqs.Arn
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        # Map the incoming JSON body to the SQS MessageBody parameter
        RequestTemplates:
          application/json: "Action=SendMessage&MessageBody=$util.urlEncode($input.body)"
        PassthroughBehavior: NEVER
        IntegrationResponses:
          - StatusCode: "200"
            ResponseTemplates:
              application/json: '{"message": "Order enqueued successfully"}'
          - StatusCode: "400"
            SelectionPattern: "4\\d{2}"
            ResponseTemplates:
              application/json: '{"message": "Bad request"}'
          - StatusCode: "500"
            SelectionPattern: "5\\d{2}"
            ResponseTemplates:
              application/json: '{"message": "Internal server error"}'
      MethodResponses:
        - StatusCode: "200"
          ResponseModels:
            application/json: Empty
        - StatusCode: "400"
          ResponseModels:
            application/json: Empty
        - StatusCode: "500"
          ResponseModels:
            application/json: Empty

  # # GET /order → SQS (receive/peek — optional, usually done via Lambda)
  # # Kept here to show the pattern; adjust or remove as needed.
  # OrderGetMethod:
  #   Type: AWS::ApiGateway::Method
  #   Properties:
  #     RestApiId: !Ref RestApi
  #     ResourceId: !Ref OrderResource
  #     HttpMethod: GET
  #     AuthorizationType: NONE
  #     Integration:
  #       Type: AWS
  #       IntegrationHttpMethod: POST
  #       Uri: !Sub "arn:aws:apigateway:${AwsRegion}:sqs:path/${AwsAccountId}/${OrderQueueName}"
  #       Credentials: !GetAtt ApiGatewayToSQSRole.Arn
  #       RequestParameters:
  #         integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
  #       RequestTemplates:
  #         application/json: "Action=ReceiveMessage&MaxNumberOfMessages=10"
  #       PassthroughBehavior: NEVER
  #       IntegrationResponses:
  #         - StatusCode: "200"
  #           ResponseTemplates:
  #             application/json: $input.body
  #     MethodResponses:
  #       - StatusCode: "200"
  #         ResponseModels:
  #           application/json: Empty

  # ----------------------------------------------------------
  # 5. /user resource
  # ----------------------------------------------------------
  # UserResource:
  #   Type: AWS::ApiGateway::Resource
  #   Properties:
  #     RestApiId: !Ref RestApi
  #     ParentId: !GetAtt RestApi.RootResourceId
  #     PathPart: user

  # # POST /user → SQS (enqueue a user event)
  # UserPostMethod:
  #   Type: AWS::ApiGateway::Method
  #   Properties:
  #     RestApiId: !Ref RestApi
  #     ResourceId: !Ref UserResource
  #     HttpMethod: POST
  #     AuthorizationType: NONE
  #     RequestParameters:
  #       method.request.header.Content-Type: false
  #     Integration:
  #       Type: AWS
  #       IntegrationHttpMethod: POST
  #       Uri: !Sub "arn:aws:apigateway:${AwsRegion}:sqs:path/${AwsAccountId}/${UserQueueUrl}"
  #       Credentials: !GetAtt ApiGatewayToSQSRole.Arn
  #       RequestParameters:
  #         integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
  #       RequestTemplates:
  #         application/json: "Action=SendMessage&MessageBody=$util.urlEncode($input.body)"
  #       PassthroughBehavior: NEVER
  #       IntegrationResponses:
  #         - StatusCode: "200"
  #           ResponseTemplates:
  #             application/json: '{"message": "User event enqueued successfully"}'
  #         - StatusCode: "400"
  #           SelectionPattern: "4\\d{2}"
  #           ResponseTemplates:
  #             application/json: '{"message": "Bad request"}'
  #         - StatusCode: "500"
  #           SelectionPattern: "5\\d{2}"
  #           ResponseTemplates:
  #             application/json: '{"message": "Internal server error"}'
  #     MethodResponses:
  #       - StatusCode: "200"
  #         ResponseModels:
  #           application/json: Empty
  #       - StatusCode: "400"
  #         ResponseModels:
  #           application/json: Empty
  #       - StatusCode: "500"
  #         ResponseModels:
  #           application/json: Empty

  # # GET /user
  # UserGetMethod:
  #   Type: AWS::ApiGateway::Method
  #   Properties:
  #     RestApiId: !Ref RestApi
  #     ResourceId: !Ref UserResource
  #     HttpMethod: GET
  #     AuthorizationType: NONE
  #     Integration:
  #       Type: AWS
  #       IntegrationHttpMethod: POST
  #       Uri: !Sub "arn:aws:apigateway:${AwsRegion}:sqs:path/${AwsAccountId}/${UserQueueUrl}"
  #       Credentials: !GetAtt ApiGatewayToSQSRole.Arn
  #       RequestParameters:
  #         integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
  #       RequestTemplates:
  #         application/json: "Action=ReceiveMessage&MaxNumberOfMessages=10"
  #       PassthroughBehavior: NEVER
  #       IntegrationResponses:
  #         - StatusCode: "200"
  #           ResponseTemplates:
  #             application/json: $input.body
  #     MethodResponses:
  #       - StatusCode: "200"
  #         ResponseModels:
  #           application/json: Empty

  # ----------------------------------------------------------
  # 6. Deployment (snapshot of all methods above)
  #    Must depend on every method so they exist before deploy.
  # ----------------------------------------------------------
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - OrderPostMethod
      # - OrderGetMethod
      # - UserPostMethod
      # - UserGetMethod
    Properties:
      RestApiId: !Ref RestApiToSQS
      Description: !Sub "Deployment for API for ${ProjectName} project"

  # ----------------------------------------------------------
  # 7. Stage
  # ----------------------------------------------------------
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApiToSQS
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      Description: !Sub "${StageName} stage from project ${ProjectName}"
      # Structured access logging
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: >
          {"requestId":"$context.requestId",
           "ip":"$context.identity.sourceIp",
           "method":"$context.httpMethod",
           "resource":"$context.resourcePath",
           "status":"$context.status",
           "responseLength":"$context.responseLength",
           "integrationLatency":"$context.integrationLatency"}
      # Per-method throttling and logging (applies to all methods)
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          MetricsEnabled: true
          DataTraceEnabled: false        # set true only for debugging — logs full req/resp
          LoggingLevel: INFO
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50


# ============================================================
# OUTPUTS  (consumed by root-stack.yaml via !GetAtt)
# ============================================================
Outputs:

  ApiGwRestApiId:
    Description: ID of the REST API
    Value: !Ref RestApiToSQS
    Export:  # globally accessible reference (within the region/account)
      Name: !Sub "${AWS::StackName}-RestApiId"

  APIEndpoint:
    Description: Invoke URL for the deployed stage
    Value: !Sub "https://${RestApiToSQS}.execute-api.${AwsRegion}.amazonaws.com/${StageName}"
    Export:
      Name: !Sub "${AWS::StackName}-APIEndpoint"

  RoleApiGwSqsArn:
    Description: ARN of the IAM role used by API Gateway to write to SQS
    Value: !GetAtt RoleApiGwSqs.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleApiGwSqsArn"

  OrderResourceId:
    Description: API Gateway resource ID for /order
    Value: !Ref OrderResource
    Export:
      Name: !Sub "${AWS::StackName}-OrderResourceId"

  # UserResourceId:
  #   Description: API Gateway resource ID for /user
  #   Value: !Ref UserResource
  #   Export:
  #     Name: !Sub "${AWS::StackName}-UserResourceId"